<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wellness Medicals – Login</title>
  <link rel="icon" type="image/jpeg" href="assets/hms-logo.jpg">
  <meta name="description" content="Secure login portal for Wellness Medicals Hospital Management System." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-body">
  <!-- Ambient Background -->
  <div class="ambient-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-container">
    <!-- Brand Panel -->
    <div class="brand-panel">
      <div class="brand-logo">
        <img src="assets/hms-logo.jpg" alt="Wellness Medicals Logo" class="logo-icon" />
      </div>
      <h1 class="brand-name">Wellness Medicals</h1>
      <p class="brand-tagline">Integrated Hospital Management System</p>
      <div class="brand-stats">
        <div class="stat-item"><span class="stat-num">3,240+</span><span class="stat-label">Patients Served</span></div>
        <div class="stat-divider"></div>
        <div class="stat-item"><span class="stat-num">45+</span><span class="stat-label">Doctors</span></div>
        <div class="stat-divider"></div>
        <div class="stat-item"><span class="stat-num">12</span><span class="stat-label">Departments</span></div>
      </div>
    </div>

    <!-- Login Form Panel -->
    <div class="form-panel glass-card">
      <div class="form-header">
        <h2>Welcome back</h2>
        <p>Sign in to your account to continue</p>
      </div>

      <!-- Role Selector -->
      <div class="role-selector" id="roleSelector">
        <button class="role-btn active" data-role="admin" id="roleAdmin">
          <span class="material-icons-round">admin_panel_settings</span>Admin
        </button>
        <button class="role-btn" data-role="doctor" id="roleDoctor">
          <span class="material-icons-round">medical_services</span>Doctor
        </button>
        <button class="role-btn" data-role="staff" id="roleStaff">
          <span class="material-icons-round">badge</span>Staff
        </button>
      </div>

      <form id="loginForm" class="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email / Employee ID</label>
          <div class="input-wrapper">
            <span class="material-icons-round input-icon">alternate_email</span>
            <input type="email" id="email" placeholder="dr.smith@wellness.com" autocomplete="username" />
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <span class="material-icons-round input-icon">lock</span>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
              <span class="material-icons-round" id="pwIcon">visibility</span>
            </button>
          </div>
        </div>
        <div class="form-row">
          <label class="checkbox-label">
            <input type="checkbox" id="rememberMe" />
            <span class="checkmark"></span>Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <div class="error-msg" id="errorMsg" aria-live="polite"></div>

        <button type="submit" class="btn-primary btn-login" id="loginBtn">
          <span class="btn-text">Sign In</span>
          <span class="material-icons-round btn-arrow">arrow_forward</span>
          <div class="btn-loader" id="btnLoader"></div>
        </button>
      </form>

      <div class="quick-access">
        <p class="quick-label">Quick Demo Access</p>
        <div class="demo-btns">
          <button class="demo-btn" onclick="quickLogin('admin')">Admin Demo</button>
          <button class="demo-btn" onclick="quickLogin('doctor')">Doctor Demo</button>
          <button class="demo-btn" onclick="quickLogin('staff')">Staff Demo</button>
        </div>
      </div>

      <p class="login-footer">Wellness Medicals HMS &copy; 2026 &middot; <a href="#">Privacy Policy</a> &middot; <a href="#">Support</a></p>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
